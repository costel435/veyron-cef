<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #tv-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tv-frame {
            width: 95%;
            height: 95%;
            background: #000;
            border-radius: 8px;
            box-shadow: 
                inset 0 2px 10px rgba(0,0,0,0.8),
                0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .tv-screen {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .standby-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #333;
            text-align: center;
        }

        .tv-logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #222;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }

        .tv-text {
            font-size: 14px;
            color: #444;
            margin-bottom: 10px;
        }

        .tv-status {
            font-size: 12px;
            color: #555;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
        }

        .video-container.active {
            display: block;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* Loading animation */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 16px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid #666;
            border-top: 2px solid #999;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error state */
        .error-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a0000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff6666;
            text-align: center;
        }

        .error-screen.active {
            display: flex;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .error-message {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .error-details {
            font-size: 12px;
            color: #cc5555;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="tv-container">
        <div class="tv-frame">
            <div class="tv-screen">
                <!-- Standby screen -->
                <div class="standby-screen" id="standby">
                    <div class="tv-logo">TV</div>
                    <div class="tv-text">Ready to play</div>
                    <div class="tv-status">Waiting for video...</div>
                </div>

                <!-- Video container -->
                <div class="video-container" id="video-container">
                    <iframe class="video-iframe" id="video-iframe" 
                            allowfullscreen 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                    </iframe>
                </div>

                <!-- Loading screen -->
                <div class="loading" id="loading">
                    Loading video...
                </div>

                <!-- Error screen -->
                <div class="error-screen" id="error">
                    <div class="error-icon">⚠</div>
                    <div class="error-message">Failed to load video</div>
                    <div class="error-details" id="error-details">Please check the URL and try again.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // TV State
        let currentVideo = null;
        let isLoading = false;

        // Elements
        const standby = document.getElementById('standby');
        const videoContainer = document.getElementById('video-container');
        const videoIframe = document.getElementById('video-iframe');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const errorDetails = document.getElementById('error-details');

        // Show screen state
        function showScreen(screen) {
            // Hide all screens
            standby.style.display = 'none';
            videoContainer.classList.remove('active');
            loading.classList.remove('active');
            error.classList.remove('active');

            // Show selected screen
            switch(screen) {
                case 'standby':
                    standby.style.display = 'flex';
                    break;
                case 'video':
                    videoContainer.classList.add('active');
                    break;
                case 'loading':
                    loading.classList.add('active');
                    break;
                case 'error':
                    error.classList.add('active');
                    break;
            }
        }

        // Extract video ID from YouTube URL
        function extractYouTubeId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/watch\?.*v=([^&\n?#]+)/
            ];

            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) {
                    return match[1];
                }
            }
            return null;
        }

        // Create embed URL for YouTube
        function createYouTubeEmbedUrl(videoId) {
            return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&rel=0&modestbranding=1&controls=1&showinfo=0`;
        }

        // Load video
        function loadVideo(url) {
            if (!url || url.trim() === '') {
                showError('No URL provided');
                return;
            }

            showScreen('loading');
            isLoading = true;

            try {
                const videoId = extractYouTubeId(url);
                
                if (!videoId) {
                    showError('Invalid YouTube URL', 'Please provide a valid YouTube video URL');
                    return;
                }

                const embedUrl = createYouTubeEmbedUrl(videoId);
                
                // Load video in iframe
                videoIframe.src = embedUrl;
                currentVideo = url;

                // Show video after a short delay (allowing iframe to load)
                setTimeout(() => {
                    if (currentVideo === url) {
                        showScreen('video');
                        isLoading = false;
                    }
                }, 2000);

            } catch (err) {
                showError('Failed to process URL', err.message);
                isLoading = false;
            }
        }

        // Stop video
        function stopVideo() {
            currentVideo = null;
            videoIframe.src = '';
            showScreen('standby');
            isLoading = false;
        }

        // Show error
        function showError(message, details = '') {
            errorDetails.textContent = details || 'Please try again with a different URL.';
            showScreen('error');
            isLoading = false;
        }

        // Handle iframe load events
        videoIframe.addEventListener('load', () => {
            if (isLoading && currentVideo) {
                showScreen('video');
                isLoading = false;
            }
        });

        videoIframe.addEventListener('error', () => {
            if (isLoading) {
                showError('Failed to load video', 'The video could not be loaded. Please check if the URL is correct.');
                isLoading = false;
            }
        });

        // CEF Events
        if (typeof cef !== 'undefined') {
            cef.on('tv:play', function(videoUrl) {
                console.log('Playing video:', videoUrl);
                loadVideo(videoUrl);
            });

            cef.on('tv:stop', function() {
                console.log('Stopping video');
                stopVideo();
            });

            cef.on('tv:volume', function(volume) {
                console.log('Setting volume:', volume);
                if (videoIframe.contentWindow) {
                    videoIframe.contentWindow.postMessage({
                        event: 'command',
                        func: 'setVolume',
                        args: [volume]
                    }, '*');
                }
            });
        }

        // Initialize
        showScreen('standby');
        console.log('TV System initialized');
    </script>
</body>
</html>
