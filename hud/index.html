<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veyron HUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== BOTTOM-RIGHT: Main Stats HUD ===== */
        #hud-stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        /* Server logo / name */
        #server-name {
            font-size: 14px;
            font-weight: 700;
            color: #c2a2da;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        /* Health & Armor bars */
        .stat-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 220px;
        }

        .stat-bar .icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .stat-bar .bar-bg {
            flex: 1;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-bar .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .stat-bar .bar-value {
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            width: 30px;
            text-align: right;
        }

        #hp-fill {
            background: linear-gradient(90deg, #ff4444, #ff6b6b);
            width: 100%;
        }

        #armor-fill {
            background: linear-gradient(90deg, #4488ff, #66aaff);
            width: 0%;
        }

        /* Money */
        #money-display {
            font-size: 22px;
            font-weight: 700;
            color: #55cc55;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
            text-align: right;
            margin-top: 2px;
        }

        #money-display.negative {
            color: #ff4444;
        }

        /* Wanted Stars */
        #wanted-display {
            display: flex;
            gap: 3px;
            justify-content: flex-end;
            margin-top: 2px;
        }

        .wanted-star {
            font-size: 16px;
            color: rgba(100, 100, 100, 0.4);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            transition: color 0.3s ease;
        }

        .wanted-star.active {
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.6), 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* ===== BOTTOM-CENTER: Speedometer (only when in vehicle) ===== */
        #speedometer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        #speed-value {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            line-height: 1;
        }

        #speed-unit {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #vehicle-name {
            font-size: 13px;
            font-weight: 600;
            color: #c2a2da;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            margin-top: 2px;
        }

        /* Speed color tiers */
        #speed-value.tier-slow { color: #ffffff; }
        #speed-value.tier-normal { color: #ffcc00; }
        #speed-value.tier-fast { color: #ff8800; }
        #speed-value.tier-extreme { color: #ff2222; }

        /* ===== TOP-RIGHT: Clock & Zone ===== */
        #top-info {
            position: fixed;
            top: 12px;
            right: 20px;
            text-align: right;
        }

        #clock {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
        }

        #zone-name {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            margin-top: 2px;
        }

        /* ===== NOTIFICATION POPUP ===== */
        #notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            border-left: 3px solid #c2a2da;
            border-radius: 4px;
            padding: 10px 16px;
            max-width: 300px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        #notification.show {
            display: block;
        }

        #notif-title {
            font-size: 12px;
            font-weight: 700;
            color: #c2a2da;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #notif-text {
            font-size: 13px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 4px;
            line-height: 1.4;
        }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Top Right: Clock & Zone -->
    <div id="top-info">
        <div id="clock">12:00</div>
        <div id="zone-name">Los Santos</div>
    </div>

    <!-- Bottom Right: Stats -->
    <div id="hud-stats">
        <div id="server-name">VEYRON RPG</div>

        <!-- Wanted Stars -->
        <div id="wanted-display">
            <span class="wanted-star" data-star="1">★</span>
            <span class="wanted-star" data-star="2">★</span>
            <span class="wanted-star" data-star="3">★</span>
            <span class="wanted-star" data-star="4">★</span>
            <span class="wanted-star" data-star="5">★</span>
            <span class="wanted-star" data-star="6">★</span>
        </div>

        <!-- Money -->
        <div id="money-display">$0</div>

        <!-- Health -->
        <div class="stat-bar">
            <span class="icon" style="color:#ff4444;">♥</span>
            <div class="bar-bg"><div class="bar-fill" id="hp-fill"></div></div>
            <span class="bar-value" id="hp-value">100</span>
        </div>

        <!-- Armor -->
        <div class="stat-bar">
            <span class="icon" style="color:#4488ff;">🛡</span>
            <div class="bar-bg"><div class="bar-fill" id="armor-fill"></div></div>
            <span class="bar-value" id="armor-value">0</span>
        </div>
    </div>

    <!-- Bottom Center: Speedometer -->
    <div id="speedometer">
        <div id="speed-value">0</div>
        <div id="speed-unit">KM/H</div>
        <div id="vehicle-name">—</div>
    </div>

    <!-- Notification popup -->
    <div id="notification">
        <div id="notif-title">NOTIFICATION</div>
        <div id="notif-text">Welcome to Veyron RPG!</div>
    </div>

    <script>
        // ===== HUD State =====
        let hudState = {
            hp: 100,
            armor: 0,
            money: 0,
            wanted: 0,
            speed: 0,
            inVehicle: false,
            vehicleName: '',
            zone: 'Los Santos',
            hour: 12,
            minute: 0
        };

        // ===== Update Functions =====
        function updateHealth(hp) {
            hudState.hp = Math.max(0, Math.min(100, hp));
            document.getElementById('hp-fill').style.width = hudState.hp + '%';
            document.getElementById('hp-value').textContent = Math.round(hudState.hp);
        }

        function updateArmor(armor) {
            hudState.armor = Math.max(0, Math.min(100, armor));
            document.getElementById('armor-fill').style.width = hudState.armor + '%';
            document.getElementById('armor-value').textContent = Math.round(hudState.armor);
        }

        function updateMoney(money) {
            hudState.money = money;
            const el = document.getElementById('money-display');
            if (money < 0) {
                el.textContent = '-$' + Math.abs(money).toLocaleString();
                el.classList.add('negative');
            } else {
                el.textContent = '$' + money.toLocaleString();
                el.classList.remove('negative');
            }
        }

        function updateWanted(level) {
            hudState.wanted = Math.max(0, Math.min(6, level));
            document.querySelectorAll('.wanted-star').forEach(star => {
                const starNum = parseInt(star.dataset.star);
                star.classList.toggle('active', starNum <= hudState.wanted);
            });
        }

        function updateSpeed(speed) {
            hudState.speed = Math.max(0, speed);
            const el = document.getElementById('speed-value');
            el.textContent = Math.round(hudState.speed);

            // Color tier
            el.className = '';
            if (hudState.speed < 60) el.classList.add('tier-slow');
            else if (hudState.speed < 120) el.classList.add('tier-normal');
            else if (hudState.speed < 180) el.classList.add('tier-fast');
            else el.classList.add('tier-extreme');
        }

        function updateVehicle(inVehicle, vehicleName) {
            hudState.inVehicle = inVehicle;
            hudState.vehicleName = vehicleName || '';
            const speedo = document.getElementById('speedometer');
            speedo.style.display = inVehicle ? 'flex' : 'none';
            document.getElementById('vehicle-name').textContent = vehicleName || '—';
            if (!inVehicle) updateSpeed(0);
        }

        function updateZone(zone) {
            hudState.zone = zone;
            document.getElementById('zone-name').textContent = zone;
        }

        function updateClock(hour, minute) {
            hudState.hour = hour;
            hudState.minute = minute;
            const h = String(hour).padStart(2, '0');
            const m = String(minute).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }

        function showNotification(title, text, duration) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-title').textContent = title;
            document.getElementById('notif-text').textContent = text;
            notif.classList.add('show');
            notif.style.animation = 'slideIn 0.3s ease';

            setTimeout(() => {
                notif.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    notif.classList.remove('show');
                }, 280);
            }, duration || 5000);
        }

        function toggleHud(visible) {
            document.getElementById('hud-stats').style.display = visible ? 'flex' : 'none';
            document.getElementById('top-info').style.display = visible ? 'block' : 'none';
        }

        // ===== CEF Event Listeners =====
        // Server sends events via cef_emit_event, JS receives them here
        if (typeof cef !== 'undefined') {
            cef.on('hud:health', function(hp) {
                updateHealth(parseInt(hp));
            });

            cef.on('hud:armor', function(armor) {
                updateArmor(parseInt(armor));
            });

            cef.on('hud:money', function(money) {
                updateMoney(parseInt(money));
            });

            cef.on('hud:wanted', function(level) {
                updateWanted(parseInt(level));
            });

            cef.on('hud:speed', function(speed) {
                updateSpeed(parseInt(speed));
            });

            cef.on('hud:vehicle', function(inVehicle, name) {
                updateVehicle(inVehicle === '1' || inVehicle === 'true', name || '');
            });

            cef.on('hud:zone', function(zone) {
                updateZone(zone);
            });

            cef.on('hud:clock', function(hour, minute) {
                updateClock(parseInt(hour), parseInt(minute));
            });

            cef.on('hud:notify', function(title, text, duration) {
                showNotification(title, text, parseInt(duration) || 5000);
            });

            cef.on('hud:toggle', function(visible) {
                toggleHud(visible === '1' || visible === 'true');
            });

            // Full state update (all at once)
            cef.on('hud:update', function(hp, armor, money, wanted, speed, inVeh, vehName, zone, hour, minute) {
                updateHealth(parseInt(hp));
                updateArmor(parseInt(armor));
                updateMoney(parseInt(money));
                updateWanted(parseInt(wanted));
                updateSpeed(parseInt(speed));
                updateVehicle(inVeh === '1', vehName);
                updateZone(zone);
                updateClock(parseInt(hour), parseInt(minute));
            });
        }

        // Listen for I key to toggle inventory
        document.addEventListener('keydown', function(e) {
            if (e.key === 'i' || e.key === 'I') {
                if (typeof cef !== 'undefined') {
                    cef.emit('inv:toggle');
                }
            }
            // M key to toggle phone
            if (e.key === 'm' || e.key === 'M') {
                if (typeof cef !== 'undefined') {
                    cef.emit('phone:toggle');
                }
            }
        });
    </script>
</body>
</html>
