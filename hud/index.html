<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veyron HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== TOP-RIGHT: Date/Time + Money Card ===== */
        #top-right {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        /* Date & Time card */
        .hud-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #datetime-card {
            text-align: center;
            min-width: 120px;
        }

        #hud-date {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 1px;
        }

        #hud-time {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
            margin-top: 2px;
        }

        /* Money card */
        #money-card {
            min-width: 150px;
        }

        .money-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
        }

        .money-row + .money-row {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 3px;
            padding-top: 6px;
        }

        .money-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .money-dot.cash { background: #4cd964; }
        .money-dot.bank { background: #4cd964; }

        .money-icon {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.45);
            width: 18px;
            text-align: center;
        }

        .money-amount {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            flex: 1;
            text-align: right;
        }

        /* ===== BOTTOM-RIGHT: Speedometer + Info ===== */
        #bottom-right {
            position: fixed;
            bottom: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        /* Speedometer */
        #speedo-card {
            display: none;
            text-align: right;
            padding: 12px 18px;
        }

        #speedo-card.visible {
            display: block;
        }

        #speed-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 6px;
        }

        #speed-value {
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -2px;
        }

        #speed-unit {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Speed color tiers */
        #speed-value.tier-slow { color: #ffffff; }
        #speed-value.tier-normal { color: #f5c842; }
        #speed-value.tier-fast { color: #ff8c00; }
        #speed-value.tier-extreme { color: #ff3b30; }

        /* Vehicle info rows */
        .veh-info-row {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.55);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 3px;
        }

        .veh-info-row span {
            color: #ffffff;
            font-weight: 700;
        }

        .veh-info-row span.locked { color: #ff3b30; }
        .veh-info-row span.unlocked { color: #4cd964; }

        /* Server info bottom-right */
        #server-info {
            text-align: right;
        }

        #player-info {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #server-name {
            font-size: 14px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.35);
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        /* ===== NOTIFICATION POPUP ===== */
        #notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-left: 3px solid #4cd964;
            border-radius: 8px;
            padding: 12px 20px;
            max-width: 350px;
            min-width: 200px;
            display: none;
            animation: notifIn 0.3s ease;
        }

        #notification.show {
            display: block;
        }

        #notif-title {
            font-size: 11px;
            font-weight: 700;
            color: #4cd964;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        #notif-text {
            font-size: 13px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 4px;
            line-height: 1.4;
        }

        @keyframes notifIn {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @keyframes notifOut {
            from { transform: translateX(-50%) translateY(0); opacity: 1; }
            to { transform: translateX(-50%) translateY(-20px); opacity: 0; }
        }

        /* ===== Wanted Stars ===== */
        #wanted-display {
            display: none;
            gap: 2px;
            justify-content: flex-end;
        }

        #wanted-display.active {
            display: flex;
        }

        .wanted-star {
            font-size: 14px;
            color: rgba(100, 100, 100, 0.3);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .wanted-star.active {
            color: #ffcc00;
            text-shadow: 0 0 6px rgba(255, 204, 0, 0.5);
        }

        /* ===== Zone name ===== */
        #zone-name {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Top Right: Date/Time + Money -->
    <div id="top-right">
        <div class="hud-card" id="datetime-card">
            <div id="hud-date">01/01/2026</div>
            <div id="hud-time">12:00</div>
        </div>

        <div class="hud-card" id="money-card">
            <div class="money-row">
                <span class="money-dot cash"></span>
                <span class="money-icon">$</span>
                <span class="money-amount" id="cash-display">0</span>
            </div>
            <div class="money-row">
                <span class="money-dot bank"></span>
                <span class="money-icon">🏦</span>
                <span class="money-amount" id="bank-display">0</span>
            </div>
        </div>

        <!-- Wanted Stars (only visible when wanted > 0) -->
        <div id="wanted-display">
            <span class="wanted-star" data-star="1">★</span>
            <span class="wanted-star" data-star="2">★</span>
            <span class="wanted-star" data-star="3">★</span>
            <span class="wanted-star" data-star="4">★</span>
            <span class="wanted-star" data-star="5">★</span>
            <span class="wanted-star" data-star="6">★</span>
        </div>
    </div>

    <!-- Bottom Right: Speedometer + Server Info -->
    <div id="bottom-right">
        <div class="hud-card" id="speedo-card">
            <div id="speed-row">
                <span id="speed-value">0</span>
                <span id="speed-unit">km/h</span>
            </div>
            <div class="veh-info-row">DOORS: <span id="doors-status" class="unlocked">UNLOCKED</span></div>
            <div class="veh-info-row">FUEL: <span id="fuel-status">Infinite</span></div>
        </div>

        <div id="server-info">
            <div id="zone-name">Los Santos</div>
            <div id="player-info">Player [ID: 0]</div>
            <div id="server-name">veyron-rpg.ro</div>
        </div>
    </div>

    <!-- Notification popup -->
    <div id="notification">
        <div id="notif-title">NOTIFICATION</div>
        <div id="notif-text">Welcome to Veyron RPG!</div>
    </div>

    <script>
        // ===== HUD State =====
        let hudState = {
            hp: 100,
            armor: 0,
            money: 0,
            bank: 0,
            wanted: 0,
            speed: 0,
            inVehicle: false,
            vehicleName: '',
            zone: 'Los Santos',
            hour: 12,
            minute: 0,
            playerName: 'Player',
            playerId: 0,
            doors: 0,
            fuel: -1
        };

        // ===== Formatting =====
        function formatMoney(amount) {
            return '$' + Math.abs(amount).toLocaleString('en-US');
        }

        // ===== Update Functions =====
        function updateHealth(hp) {
            hudState.hp = Math.max(0, Math.min(100, hp));
        }

        function updateArmor(armor) {
            hudState.armor = Math.max(0, Math.min(100, armor));
        }

        function updateMoney(money) {
            hudState.money = money;
            document.getElementById('cash-display').textContent = formatMoney(money);
        }

        function updateBank(bank) {
            hudState.bank = bank;
            document.getElementById('bank-display').textContent = formatMoney(bank);
        }

        function updateWanted(level) {
            hudState.wanted = Math.max(0, Math.min(6, level));
            const container = document.getElementById('wanted-display');
            container.classList.toggle('active', hudState.wanted > 0);
            document.querySelectorAll('.wanted-star').forEach(star => {
                const starNum = parseInt(star.dataset.star);
                star.classList.toggle('active', starNum <= hudState.wanted);
            });
        }

        function updateSpeed(speed) {
            hudState.speed = Math.max(0, speed);
            const el = document.getElementById('speed-value');
            el.textContent = Math.round(hudState.speed);

            el.className = '';
            if (hudState.speed < 60) el.classList.add('tier-slow');
            else if (hudState.speed < 120) el.classList.add('tier-normal');
            else if (hudState.speed < 180) el.classList.add('tier-fast');
            else el.classList.add('tier-extreme');
        }

        function updateVehicle(inVehicle, vehicleName) {
            hudState.inVehicle = inVehicle;
            hudState.vehicleName = vehicleName || '';
            const speedo = document.getElementById('speedo-card');
            if (inVehicle) {
                speedo.classList.add('visible');
            } else {
                speedo.classList.remove('visible');
                updateSpeed(0);
            }
        }

        function updateDoors(locked) {
            hudState.doors = locked;
            const el = document.getElementById('doors-status');
            if (locked) {
                el.textContent = 'LOCKED';
                el.className = 'locked';
            } else {
                el.textContent = 'UNLOCKED';
                el.className = 'unlocked';
            }
        }

        function updateFuel(fuel) {
            hudState.fuel = fuel;
            const el = document.getElementById('fuel-status');
            if (fuel < 0) {
                el.textContent = 'Infinite';
            } else {
                el.textContent = fuel + '%';
            }
        }

        function updateZone(zone) {
            hudState.zone = zone;
            document.getElementById('zone-name').textContent = zone;
        }

        function updateClock(hour, minute) {
            hudState.hour = hour;
            hudState.minute = minute;
            const h = String(hour).padStart(2, '0');
            const m = String(minute).padStart(2, '0');
            document.getElementById('hud-time').textContent = h + ':' + m;

            // Update date display
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();
            document.getElementById('hud-date').textContent = dd + '/' + mm + '/' + yyyy;
        }

        function updatePlayerInfo(name, id) {
            hudState.playerName = name || 'Player';
            hudState.playerId = id || 0;
            document.getElementById('player-info').textContent = name + ' [ID: ' + id + ']';
        }

        function showNotification(title, text, duration) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-title').textContent = title;
            document.getElementById('notif-text').textContent = text;
            notif.classList.add('show');
            notif.style.animation = 'notifIn 0.3s ease';

            setTimeout(() => {
                notif.style.animation = 'notifOut 0.3s ease';
                setTimeout(() => {
                    notif.classList.remove('show');
                }, 280);
            }, duration || 5000);
        }

        function toggleHud(visible) {
            document.getElementById('top-right').style.display = visible ? 'flex' : 'none';
            document.getElementById('bottom-right').style.display = visible ? 'flex' : 'none';
        }

        // ===== CEF Event Listeners =====
        if (typeof cef !== 'undefined') {
            cef.on('hud:health', function(hp) {
                updateHealth(parseInt(hp));
            });

            cef.on('hud:armor', function(armor) {
                updateArmor(parseInt(armor));
            });

            cef.on('hud:money', function(money) {
                updateMoney(parseInt(money));
            });

            cef.on('hud:bank', function(bank) {
                updateBank(parseInt(bank));
            });

            cef.on('hud:wanted', function(level) {
                updateWanted(parseInt(level));
            });

            cef.on('hud:speed', function(speed) {
                updateSpeed(parseInt(speed));
            });

            cef.on('hud:vehicle', function(inVehicle, name) {
                updateVehicle(inVehicle === '1' || inVehicle === 'true', name || '');
            });

            cef.on('hud:doors', function(locked) {
                updateDoors(parseInt(locked));
            });

            cef.on('hud:fuel', function(fuel) {
                updateFuel(parseInt(fuel));
            });

            cef.on('hud:zone', function(zone) {
                updateZone(zone);
            });

            cef.on('hud:clock', function(hour, minute) {
                updateClock(parseInt(hour), parseInt(minute));
            });

            cef.on('hud:playerinfo', function(name, id) {
                updatePlayerInfo(name, parseInt(id));
            });

            cef.on('hud:notify', function(title, text, duration) {
                showNotification(title, text, parseInt(duration) || 5000);
            });

            cef.on('hud:toggle', function(visible) {
                toggleHud(visible === '1' || visible === 'true');
            });

            // Full state update (all at once)
            cef.on('hud:update', function(hp, armor, money, bank, wanted, speed, inVeh, vehName, zone, hour, minute) {
                updateHealth(parseInt(hp));
                updateArmor(parseInt(armor));
                updateMoney(parseInt(money));
                updateBank(parseInt(bank));
                updateWanted(parseInt(wanted));
                updateSpeed(parseInt(speed));
                updateVehicle(inVeh === '1', vehName);
                updateZone(zone);
                updateClock(parseInt(hour), parseInt(minute));
            });
        }

        // Listen for I key to toggle inventory
        document.addEventListener('keydown', function(e) {
            if (e.key === 'i' || e.key === 'I') {
                if (typeof cef !== 'undefined') {
                    cef.emit('inv:toggle');
                }
            }
            // M key to toggle phone
            if (e.key === 'm' || e.key === 'M') {
                if (typeof cef !== 'undefined') {
                    cef.emit('phone:toggle');
                }
            }
        });

        // Init date on load
        updateClock(12, 0);
    </script>
</body>
</html>
